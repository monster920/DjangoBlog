#version: '3'

services:
  db:
    image: docker.io/mysql:latest
    restart: always
    environment:
      - MYSQL_DATABASE=djangoblog
      - MYSQL_ROOT_PASSWORD=DjAnGoBlOg!2!Q@W#E
    ports:
      - 3306:3306
    volumes:
      - ./bin/datas/mysql/:/var/lib/mysql
    container_name: db

  redis:
    restart: always
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  djangoblog:
    build:
      context: ../../
    restart: always
    command: bash -c 'python manage.py runserver 0.0.0.0:8000'
    ports:
      - "8000:8000"
    volumes:
      - /home/blog/DjangoBlog/collectedstatic:/code/djangoblog/collectedstatic
      - /home/blog/DjangoBlog/logs:/code/djangoblog/logs
      - /home/blog/DjangoBlog/uploads:/code/djangoblog/uploads
    environment:
      - DJANGO_MYSQL_DATABASE=djangoblog
      - DJANGO_MYSQL_USER=root
      - DJANGO_MYSQL_PASSWORD=DjAnGoBlOg!2!Q@W#E
      - DJANGO_MYSQL_HOST=db
      - DJANGO_MYSQL_PORT=3306
      - DJANGO_REDIS_URL=redis:6379/1
    links:
      - db
      - redis
    depends_on:
      - db
      - redis
    container_name: djangoblog

  nginx:
    restart: always
    image: docker.io/nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./bin/nginx.conf:/etc/nginx/nginx.conf
      - /home/blog/DjangoBlog/collectedstatic:/code/djangoblog/collectedstatic
      - /etc/nginx/ssl/:/etc/nginx/ssl/      # 本地证书目录挂载到容器
    links:
      - djangoblog:djangoblog
    depends_on:
      - djangoblog
    container_name: nginx