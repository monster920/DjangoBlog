worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP 80端口：自动跳转到HTTPS
    server {
        listen       80;
        server_name  www.suisuiio.top suisuiio.top;  # 绑定的域名（含主域名和www子域名）
        
        # 强制将所有HTTP请求跳转到HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS 443端口配置
    server {
        listen       443 ssl;
        server_name  www.suisuiio.top suisuiio.top;  # 与HTTP保持一致的域名

        # SSL证书路径（请替换为你的实际证书路径）
        ssl_certificate     /etc/nginx/ssl/suisuiio.top.pem;   # 证书公钥文件
        ssl_certificate_key /etc/nginx/ssl/suisuiio.top.key;     # 证书私钥文件

        # SSL安全配置（推荐）
        ssl_protocols TLSv1.2 TLSv1.3;  # 仅支持安全的TLS协议版本
        ssl_prefer_server_ciphers on;   # 优先使用服务器端加密套件
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;  # 缓存SSL会话信息
        ssl_session_timeout 10m;           # 会话超时时间

        # 静态文件配置（与原路径保持一致）
        location /static/ {
            alias /code/djangoblog/collectedstatic/;
            expires 1d;  # 静态文件缓存优化（可选）
        }

        # 代理到Django服务
        location / {
            proxy_pass http://djangoblog:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;  # 传递HTTPS协议信息给Django
        }
    }
}